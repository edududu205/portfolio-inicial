<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title> Dki & Déh Studio </title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<h1 class="logo"> Dki & Déh <span>- Studio -</span> </h1>
<button onclick="toggleTema()" class="tema-btn"> ☽ / ☼ </button>
<p id="nomeArquivo"></p>

<div class="upload-box">

<label class="file-upload">
        Escolher imagem
    <input type="file" id="imagem">
</label>
    <input type="text" id="descricao" placeholder="Descrição da arte">
    <button onclick="salvar()">Salvar</button>
</div>

<div class="filtros">
    <button onclick="filtrar('todas', this)">Todas</button>
    <button onclick="filtrar('desenho', this)">Desenho</button>
    <button onclick="filtrar('arte', this)">Arte</button>
    <button onclick="filtrar('ideia', this)">Ideia</button>
    <button onclick="filtrar('referencia', this)">Referência</button>
</div>

<div class="galeria" id="galeria"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="script.js"></script>

</body>
</html>
